name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bundle exec brakeman --no-pager

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest
    env:
      APP_HOST: "shiroichizu.app"
      OLD_HOST: "shiroichizu.fly.dev"
      MAILER_SENDER: "noreply@shiroichizu.app"
      RESEND_API_KEY: "dummy"
      MAPTILER_API_KEY: "dummy"
      GEOAPIFY_API_KEY: "dummy"
      CLOUDFLARE_R2_BUCKET: "dummy"
      CLOUDFLARE_ACCESS_KEY_ID: "dummy"
      CLOUDFLARE_SECRET_ACCESS_KEY: "dummy"
      CLARITY_ID: "dummy"
      SENTRY_DSN: "dummy"
      R2_ENDPOINT: "https://dummy"
      CLOUDFLARE_ZONE_ID: "dummy"
      CLOUDFLARE_CACHE_PURGE_API_TOKEN: "dummy"
      R2_PUBLIC_ASSETS_HOST: "dummy"
      R2_PUBLIC_BUCKET: "dummy"
      R2_PUBLIC_SECRET_ACCESS_KEY: "dummy"
      R2_PUBLIC_ACCESS_KEY_ID: "dummy"

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

      # redis:
      #   image: redis
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y google-chrome-stable curl libjemalloc2 libvips postgresql-client

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
