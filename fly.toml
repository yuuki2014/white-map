# fly.toml app configuration file generated for shiroichizu on 2026-04-13T21:06:16+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shiroichizu'
primary_region = 'nrt'
console_command = '/rails/bin/rails console'

[build]

[env]
  APP_HOST = "shiroichizu.app"
  OLD_HOST = "shiroichizu.fly.dev"
  MAILER_SENDER = "noreply@shiroichizu.app"
  RAILS_ENV = "production"
  STYLE_URL = 'https://tiles.shiroichizu.app/json/style_2026_04_13_v2.json'
  WEB_CONCURRENCY = "1"
  RAILS_MAX_THREADS = "3"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpus = 1
  memory_mb = 1024
